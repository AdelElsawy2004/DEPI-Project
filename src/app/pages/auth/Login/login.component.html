<app-floating-configurator />
<div class="login-page bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen min-w-screen overflow-hidden">
    <div class="login-shell flex flex-col items-center justify-center">
        <div class="login-frame">
            <svg class="login-frame__border" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
                <rect class="login-frame__border-track" x="1.4" y="1.4" width="97.2" height="97.2" rx="12" ry="12"></rect>
                <rect class="login-frame__border-line" x="1.4" y="1.4" width="97.2" height="97.2" rx="12" ry="12" pathLength="100"></rect>
            </svg>

            <div class="login-frame__content w-full bg-surface-0 dark:bg-surface-900 py-20 px-8 sm:px-20">
                <div class="text-center mb-8">
                    <img src="assets/images/MedFinder-Logo-mini.png" alt="login-logo" class="w-20 h-20 mb-4 ml-47">
                    <div class="text-surface-900 dark:text-surface-0 text-3xl font-medium mb-4">Welcome to MedFinder!
                    </div>
                    <span class="text-muted-color font-medium">Sign in to continue</span>
                </div>

                <div>
                    <label for="email1"
                        class="block text-surface-900 dark:text-surface-0 text-xl font-medium mb-2">Email</label>
                    <input pInputText id="email1" type="text" placeholder="Email address" class="w-full md:w-120 mb-8"
                        [(ngModel)]="email" />

                    <label for="password1"
                        class="block text-surface-900 dark:text-surface-0 font-medium text-xl mb-2">Password</label>
                    <p-password id="password1" [(ngModel)]="password" placeholder="Password" [toggleMask]="true"
                        styleClass="mb-4" [fluid]="true" [feedback]="false"></p-password>

                    <div class="flex items-center justify-between mt-2 mb-8 gap-8">
                        <div class="flex items-center">
                            <p-checkbox [(ngModel)]="checked" id="rememberme1" binary class="mr-2"></p-checkbox>
                            <label for="rememberme1">Remember me</label>
                        </div>
                        <span class="font-medium no-underline ml-2 text-right cursor-pointer text-primary">Forgot
                            password?</span>
                    </div>
                    <p-button label="Sign In" styleClass="w-full" routerLink="/"></p-button>
                </div>
            </div>
        </div>
    </div>
</div>
