<div class="layout-sidebar" [class.sidebar-collapsed]="isCollapsed">
    <a class="layout-sidebar-brand" routerLink="/">
        <span class="layout-sidebar-brand-copy">
            <img [src]="isCollapsed ? collapsedLogo : fullLogo" alt="MedFinder-logo">
            <small class="ml-14 hide-on-collapse">Pharmacy Admin</small>
        </span>
    </a>

    <div class="layout-sidebar-divider"></div>

    <div class="layout-sidebar-menu">
        <app-menu></app-menu>
    </div>

    <div class="layout-sidebar-footer flex flex-col gap-3 p-4 border-t border-gray-100">
        <a class="flex items-center gap-4 px-3 py-3 text-red-500 no-underline hover:bg-red-50 rounded-xl transition-all group"
            routerLink="/auth/login">
            <i class="pi pi-sign-out text-2xl w-8 text-center transition-transform group-hover:scale-110"></i>
            <span *ngIf="!isCollapsed" class="font-semibold text-lg">Logout</span>
        </a>
    
        <button
            class="flex items-center gap-4 px-3 py-3 text-gray-500 bg-transparent border-none cursor-pointer hover:bg-gray-100 rounded-xl transition-all group w-full"
            (click)="toggleSidebar()">
            <i class="pi text-xl w-8 text-center transition-transform group-hover:scale-110"
                [ngClass]="{'pi-angle-left': !isCollapsed, 'pi-angle-right': isCollapsed}"></i>
            <span *ngIf="!isCollapsed" class="font-medium text-lg">Collapse</span>
        </button>
    </div>
</div>
